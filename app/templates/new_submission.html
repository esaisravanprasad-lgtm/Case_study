{% extends "base.html" %}
{% block content %}
<h1 class="h3">Start an expense submission</h1>
<p class="text-secondary">Select a seeded employee or create a new employee record, then upload mixed-format receipts.</p>
<form class="card card-body" action="/submissions" method="post" enctype="multipart/form-data">
  <h2 class="h5">Employee and trip</h2>
  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Existing employee</label>
      <select class="form-select" name="employee_pk">
        <option value="">Create a new employee below</option>
        {% for employee in employees %}
          <option value="{{ employee.id }}">{{ employee.name }} ({{ employee.employee_id }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-6"><label class="form-label">Trip dates</label><input required class="form-control" name="trip_dates" placeholder="2025-07-10 to 2025-07-12"></div>
    <div class="col-12"><label class="form-label">Trip purpose</label><input required class="form-control" name="trip_purpose" placeholder="Client review meeting in Dallas"></div>
  </div>
  <details class="mt-3">
    <summary class="fw-semibold">New employee fields</summary>
    <div class="row g-3 mt-1">
      <div class="col-md-4"><label class="form-label">Employee ID</label><input class="form-control" name="employee_id"></div>
      <div class="col-md-4"><label class="form-label">Name</label><input class="form-control" name="name"></div>
      <div class="col-md-4"><label class="form-label">Grade</label><input class="form-control" type="number" name="grade" min="1" max="10" value="1"></div>
      <div class="col-md-4"><label class="form-label">Title</label><input class="form-control" name="title"></div>
      <div class="col-md-4"><label class="form-label">Department</label><input class="form-control" name="department"></div>
      <div class="col-md-4"><label class="form-label">Manager ID</label><input class="form-control" name="manager_id"></div>
      <div class="col-md-4"><label class="form-label">Home base</label><input class="form-control" name="home_base"></div>
    </div>
  </details>
  <hr>
  <h2 class="h5">Receipts</h2>
  <p class="small text-secondary">Accepted: PDF, JPG, PNG, TXT. Maximum 8 MB per file.</p>
  <input required class="form-control" type="file" name="receipts" accept=".pdf,.jpg,.jpeg,.png,.txt" multiple>
  <div class="mt-4"><button class="btn btn-primary">Run pre-review</button></div>
</form>
{% endblock %}
